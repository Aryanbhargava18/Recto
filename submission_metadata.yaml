    TF-IDF sparse similarity matrix pre-computed via precompute_embeddings.py.
    This generates a semantic_scores.pkl file used as an additive scoring boost.

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "Cursor"
  - "Gemini / Antigravity"

ai_usage_summary: |
  Used Claude and Gemini for architecture discussion, code review, and debugging.
  Used Cursor for IDE autocomplete and refactoring.
  No candidate data was sent to any LLM during ranking.
  The ranking pipeline execution is fully deterministic with zero external API calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid heuristic + semantic ranker. Five-layer scoring pipeline:
  (1) Hard-kill filters eliminate salary traps and honeypots.
  (2) Core IR scoring uses rare-skill matching (BM25, Learning to Rank, etc.),
      career history parsing with IR role counting, and anti-gaming coherence
      ratios to penalize keyword stuffers.
  (3) Behavioral multipliers adjust scores based on response rates, notice
      periods, recruiter saves, and ghost detection.
  (4) Pre-computed TF-IDF cosine similarity provides an additive semantic
      boost without penalizing strong heuristic candidates.
  (5) Deterministic sort by unified HYBRID_SCORE ensures zero score inversions.
  Runtime: ~60s for 100K candidates on CPU. Peak RAM: ~4GB.

